syntax = "proto2";
package pb;

import "gogo.proto";


enum EntryType {
	EntryNormal     = 0;
	EntryConfChange = 1;
}

message Entry {
	optional uint64     Term  = 2;
	optional uint64     Index = 3;  // must be 64-bit aligned for atomic operations
	optional EntryType  Type  = 1;
	optional bytes      Data  = 4;
}

message SnapshotMetadata {
	optional ConfState conf_state = 1;
	optional uint64    index      = 2;
	optional uint64    term       = 3;
}

message Snapshot {
	optional bytes            data     = 1;
	optional SnapshotMetadata metadata = 2;
}

enum MessageType {
	MsgHup             = 0;
	MsgBeat            = 1;
	MsgProp            = 2;
	MsgApp             = 3;
	MsgAppResp         = 4;
	MsgVote            = 5;
	MsgVoteResp        = 6;
	MsgSnap            = 7;
	MsgHeartbeat       = 8;
	MsgHeartbeatResp   = 9;
	MsgUnreachable     = 10;
	MsgSnapStatus      = 11;
	MsgCheckQuorum     = 12;
	MsgTransferLeader  = 13;
	MsgTimeoutNow      = 14;
}

message Message {
	optional MessageType type        = 1  ;
	optional uint64      to          = 2  ;
	optional uint64      from        = 3  ;
	optional uint64      term        = 4  ;
	optional uint64      logTerm     = 5  ;
	optional uint64      index       = 6  ;
	repeated Entry       entries     = 7  ;
	optional uint64      applied     = 8  ;
	optional uint64      committed   = 9  ;
	optional Snapshot    snapshot    = 10 ;
	optional bool        reject      = 11 ;
	optional uint64      rejectHint  = 12 ;
}

message HardState {
	optional uint64 term   = 1 ;
	optional uint64 vote   = 2 ;
	optional uint64 commit = 3 ;
}

message ConfState {
	repeated uint64 nodes = 1;
}

enum ConfChangeType {
	ConfChangeAddNode    = 0;
	ConfChangeRemoveNode = 1;
	ConfChangeUpdateNode = 2;
}

message ConfChange {
	optional uint64          ID      = 1;
	optional ConfChangeType  Type    = 2;
	optional uint64          NodeID  = 3;
	optional bytes           Context = 4;
}
